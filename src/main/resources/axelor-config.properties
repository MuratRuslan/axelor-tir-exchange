# Application Information
# ~~~~~
application.name = TIR Exchange
application.description = TIR-EPD message exchange service (Axelor Open Platform port)
application.version = 0.0.1-SNAPSHOT
application.author = kg.itg
application.home = https://www.axelor.com
application.help = https://docs.axelor.com
application.mode = dev
application.theme = auto

# Database settings
# ~~~~~
# PostgreSQL. AOP's metadata install runs 8 parallel write transactions
# (ParallelTransactionExecutor); embedded HSQLDB serializes concurrent writers
# and deadlocks, so PostgreSQL is required for a runnable app.
#
# Adjust user/password/url to match your local PostgreSQL (see README).
db.default.driver = org.postgresql.Driver
db.default.ddl = update
db.default.url = jdbc:postgresql://localhost:5432/tirexchange
db.default.user = axelor
db.default.password = axelor

# Connection pool: must be >= the number of parallel install workers
# (one per CPU core) so the meta install doesn't starve for connections.
hibernate.hikari.minimumIdle = 5
hibernate.hikari.maximumPoolSize = 20

# Create second-level caches on demand instead of warning per entity.
hibernate.javax.cache.missing_cache_strategy = create

# Auth
# ~~~~~
# Enable stateless HTTP Basic auth so the REST endpoints can be called directly
# with credentials on each request (curl -u admin:admin ...), without a session
# cookie or CSRF token. The browser form login keeps working as well.
auth.local.basic-auth = direct

# OpenAPI / Swagger UI
# ~~~~~
# API docs are served by the bundled Swagger UI at /swagger-ui/, driven by a
# hand-authored modules/tir-exchange/src/main/webapp/swagger-ui/openapi.json.
# AOP's built-in OpenAPI scanner is not used because (in 7.4) it does not emit
# response/request models or examples from annotations.

# Shared cache mode
# ~~~~~
javax.persistence.sharedCache.mode = ENABLE_SELECTIVE

# Do not import any demo data
# ~~~~~
data.import.demo-data = false

# Session timeout (in minutes)
# ~~~~~
session.timeout = 60

# Logging
# ~~~~~
logging.level.root = INFO
logging.level.com.axelor = INFO
logging.level.kg.itg = DEBUG
